<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - Cruz Azul</title>
    <link rel="stylesheet" href="../css/usuarios.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <h1>Cruz Azul ✙</h1>
        <nav>
            <a href="./dashboard.html">Dashboard</a>
            <a href="./ongs.html">ONGs</a>
            <a href="./logs.html">Logs</a>
            <a href="./usuarios.html">Usuários</a>
            <a href="./configuracoes.html">Config</a>
            <a href="#">Sair</a>
        </nav>
    </header>

    <main class="container">

        <h2>Controle de Usuários</h2>

        <!-- FILTROS -->
        <section class="filters">
            <input type="text" placeholder="Buscar usuário...">

            <select>
                <option>Tipo</option>
                <option>Administrador</option>
                <option>ONG</option>
                <option>Usuário comum</option>
            </select>

            <select>
                <option>Status</option>
                <option>Ativo</option>
                <option>Bloqueado</option>
            </select>

            <button>Filtrar</button>
        </section>

        <!-- TABELA -->
        <section class="table-box">

            <table>
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Email</th>
                        <th>Tipo</th>
                        <th>Status</th>
                        <th>Último acesso</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>admin</td>
                        <td>admin@cruzazul.com</td>
                        <td><span class="badge admin">Admin</span></td>
                        <td><span class="badge ativo">Ativo</span></td>
                        <td>Hoje 10:32</td>
                        <td>
                            <button class="btn-bloquear">Bloquear</button>
                        </td>
                    </tr>

                    <tr>
                        <td>ong_teste</td>
                        <td>ong@teste.com</td>
                        <td><span class="badge ong">ONG</span></td>
                        <td><span class="badge bloqueado">Bloqueado</span></td>
                        <td>Ontem 18:20</td>
                        <td>
                            <button class="btn-ativar">Ativar</button>
                        </td>
                    </tr>

                    <tr>
                        <td>usuario123</td>
                        <td>user@email.com</td>
                        <td><span class="badge comum">Usuário</span></td>
                        <td><span class="badge ativo">Ativo</span></td>
                        <td>Hoje 09:10</td>
                        <td>
                            <button class="btn-bloquear">Bloquear</button>
                            <button class="btn-promover">Promover</button>
                        </td>
                    </tr>
                </tbody>

            </table>

        </section>

    </main>

    <footer>
        <p>© 2026 Cruz Azul</p>
    </footer>

</body>
</html>
