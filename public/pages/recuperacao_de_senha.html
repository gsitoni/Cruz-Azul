<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de senha</title>
    <link rel="stylesheet" href="../css/recuperacao_de_senha.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap');
    </style>
</head>
<body>
    <header>
        <h1>CRUZ-AZUL ✙</h1>
    </header>
    <div class="container">
        <h2 class="subtitulo"> Recuperação de senha </h2>
        <p class="descricao"> Informe seu email no campo abaixo e aguarde o código de verificação</p>
        <form action="../php/processa_recuperacao.php" method="POST" id="form_recuperacao" class="form">
            <fieldset class="email_box">
                <legend class="legend"> E-mail </legend>
                <input class="input" name="email" type="email" required>
            </fieldset>
            <a href="codigo_de_verificacao.html" id="link_codigo">Já possuo o código de verificação</a>
            <div class="botoes">
                <button class="botao" type="button" onclick="voltar()">Voltar</button>
                <button class="botao" type="submit" onclick="avancar()">Avançar</button>
            </div>
        </form>
    </div>
    <script src="../js/recuperacao_de_senha.js"></script>
</body>
</html>
